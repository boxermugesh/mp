<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        background: radial-gradient(ellipse at center, #0a0f2c 0%, #05061a 100%);
        background-size: cover;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #ffffff;
        padding-top: 20px;
      }

      h1 {
        color: #00f5d4;
        font-size: 2.8em;
        text-align: center;
        margin-bottom: 20px;
        text-shadow: 0 0 10px #00f5d4, 0 0 20px #00f5d4;
      }

      .card {
        max-width: 650px;
        margin: 30px auto;
        background: rgba(10, 20, 40, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid #00f5d4;
        border-radius: 20px;
        box-shadow: 0 0 20px #00f5d4, 0 0 40px #008cba;
        padding: 30px;
        transition: all 0.5s ease-in-out;
      }

      .card:hover {
        transform: scale(1.02);
        box-shadow: 0 0 30px #00f5d4, 0 0 60px #008cba;
      }

      .card-header {
        background: linear-gradient(135deg, #00f5d4, #00bbf9);
        color: #000;
        font-weight: bold;
        padding: 15px;
        font-size: 1.7em;
        text-align: center;
        border-radius: 15px 15px 0 0;
        text-shadow: none;
      }

      label, .form-control {
        color: #ffffff;
      }

      input[type="file"] {
        background-color: rgba(255, 255, 255, 0.1);
        border: 1px solid #00f5d4;
      }

      .btn-primary {
        background: linear-gradient(135deg, #00f5d4, #00bbf9);
        border: none;
        color: #000;
        font-weight: bold;
        box-shadow: 0 0 10px #00f5d4;
        transition: all 0.4s ease;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #00bbf9, #00f5d4);
        transform: scale(1.05);
        box-shadow: 0 0 20px #00f5d4, 0 0 40px #00bbf9;
      }

      #result {
        background: rgba(0, 245, 212, 0.2);
        border: 1px solid #00f5d4;
        padding: 20px;
        border-radius: 15px;
        margin-top: 20px;
        text-align: center;
        font-size: 1.3em;
        box-shadow: 0 0 15px #00f5d4;
      }

      .footer {
        background-color: #05061a;
        color: #00f5d4;
        text-align: center;
        padding: 20px 0;
        margin-top: 30px;
        font-size: 1em;
        box-shadow: 0 0 15px #00f5d4;
      }

      @keyframes flicker {
        0% { opacity: 1; }
        50% { opacity: 0.8; }
        100% { opacity: 1; }
      }
    </style>
    <style>
  #result {
    background: linear-gradient(135deg, #7b2cbf, #5a189a);
    border: 2px solid #c77dff;
    padding: 25px;
    border-radius: 20px;
    margin-top: 30px;
    text-align: center;
    font-size: 1.5em;
    color: #ffffff;
    box-shadow: 0 0 25px #c77dff, 0 0 50px #9d4edd;
    animation: flicker 2s infinite;
  }

  #result h2 {
    color: #c77dff;
    font-size: 2em;
    margin-bottom: 15px;
    text-shadow: 0 0 10px #c77dff;
  }

  #result h1 {
    color: #e0aaff;
    font-size: 2.5em;
    text-shadow: 0 0 15px #e0aaff;
    margin-top: 20px;
  }
</style>
<style>
  #result {
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid rgba(0, 245, 212, 0.7);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 25px;
    margin-top: 40px;
    text-align: center;
    font-size: 1.5em;
    color: #ffffff;
    box-shadow: 0 0 25px #00f5d4, 0 0 50px #00bbf9, 0 0 75px #5a189a;
    animation: pulseGlow 3s infinite alternate;
    transition: all 0.5s ease;
  }

  #result:hover {
    transform: scale(1.03);
    box-shadow: 0 0 35px #00f5d4, 0 0 70px #00bbf9, 0 0 90px #5a189a;
  }

  #result h2 {
    color: #00f5d4;
    font-size: 2.2em;
    margin-bottom: 15px;
    text-shadow: 0 0 10px #00f5d4, 0 0 20px #00f5d4;
  }

  #result h1 {
    color: #00bbf9;
    font-size: 2.8em;
    margin-top: 20px;
    text-shadow: 0 0 15px #00bbf9, 0 0 30px #5a189a;
  }

  @keyframes pulseGlow {
    0% {
      box-shadow: 0 0 20px #00f5d4, 0 0 40px #00bbf9, 0 0 60px #5a189a;
    }
    100% {
      box-shadow: 0 0 40px #00f5d4, 0 0 80px #00bbf9, 0 0 100px #5a189a;
    }
  }
</style>

  </head>

  <body>
    <div class="container">
      <h1>CyberSecure Object Prediction</h1>

      <!-- Form Section -->
      <div class="card">
        <div class="card-header">Upload Your Video</div>
        <div class="card-body">
          <form id="uploadForm" method="POST" action="/predict" enctype="multipart/form-data">
            <div class="mb-3">
              <label for="fileInput" class="form-label">Select Video File</label>
              <input type="file" class="form-control" id="fileInput" name="file" required />
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Predict</button>
          </form>
        </div>
      </div>

      <!-- Prediction Result Section -->
      {% if prediction %}
      <div id="result">
        <h2>Prediction Results</h2>
        <h1>{{ prediction }}</h1>
      </div>
      {% endif %}
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>&copy; 2025 CyberSecure Detection</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
