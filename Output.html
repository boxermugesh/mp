<!doctype html>
<html lang="en">
<head>
  <title>UPI Prediction</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.0/animate.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.1.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    body {
      animation: cyberBackground 20s infinite alternate;
      background-size: 400% 400%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      text-align: center;
    }

    /* Cyber-style background animation */
    @keyframes cyberBackground {
      0% {
        background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
      }
      25% {
        background: linear-gradient(-45deg, #1f4037, #99f2c8, #1f4037, #0f0c29);
      }
      50% {
        background: linear-gradient(-45deg, #2b5876, #4e4376, #2b5876, #0f0c29);
      }
      75% {
        background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #0f2027);
      }
      100% {
        background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
      }
    }

    button {
      background-color: #ffca28;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      color: #1a237e;
      margin-top: 20px;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #ffc107;
      color: #0d47a1;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    p {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      margin: 10px 0;
      border-radius: 8px;
      font-size: 1.2rem;
      color: #ffffff;
    }
  </style>
</head>

<body>

  <a href="/myful">
    <button>Home</button>
  </a>

  <h1>My Prediction for the data is</h1>

  {% for k in json_data %}
    <p>{{ k }}</p>
  {% endfor %}

</body>
</html>
