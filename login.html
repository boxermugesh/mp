<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberCrime Portal - Face Detection Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      height: 100vh;
      background: #0f172a;
      position: relative;
      color: #e0e7ff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Background animation */
    .background {
      position: absolute;
      width: 200%;
      height: 200%;
      background: url('https://images.unsplash.com/photo-1607746882042-944635dfe10e?fit=crop&w=1500&q=80') repeat;
      background-size: cover;
      animation: moveBackground 40s linear infinite;
      z-index: -1;
      filter: brightness(0.3) blur(6px);
    }

    @keyframes moveBackground {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-50%, -50%); }
    }

    .login-card {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 2.5rem;
      color: #e0e7ff;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 400px;
      z-index: 1;
      text-align: center;
    }

    .login-card h2 {
      font-weight: bold;
      margin-bottom: 1rem;
      color: #38bdf8;
    }

    .login-card p {
      font-size: 0.95rem;
      margin-bottom: 2rem;
      color: #cbd5e1;
    }

    .form-control {
      background-color: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #e0e7ff;
    }

    .form-control::placeholder {
      color: #94a3b8;
    }

    .form-control:focus {
      background-color: rgba(255, 255, 255, 0.3);
      color: #fff;
      box-shadow: none;
      border-color: #38bdf8;
    }

    .btn-primary {
      background-color: #0ea5e9;
      border: none;
      font-weight: bold;
    }

    .btn-primary:hover {
      background-color: #0284c7;
    }
  </style>
</head>

<body>
  <div class="background"></div>

  <div class="login-card">
    <h2><i class="fas fa-shield-alt"></i> CyberCrime Login</h2>
    <p>Authenticate securely using facial recognition technology</p>
    <form action="/signin" method="POST">
      <div class="form-group mb-3">
        <input
          type="text"
          class="form-control"
          name="username"
          placeholder="Enter your username"
          required
        />
      </div>
      <div class="form-group mb-3">
        <input
          type="password"
          class="form-control"
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
  </div>

</body>
</html>
